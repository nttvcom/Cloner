<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#111216" />
    <title>Cloner</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #111216;
        overflow: hidden;
      }
      /* Phaser's Scale.FIT + CENTER_BOTH owns sizing AND centering of the
         canvas. Adding CSS centering here (grid/flex) double-centers and
         shifts the game right/down in windowed mode. */
      #app {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
